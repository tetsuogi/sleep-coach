    source: "Psychiatry Research, 2025",
    metric: "相乗効果", metricLabel: "リスクの増幅パターン"
  }
];

var RULES = [
  { icon: "📵", text: "20:00アラームでYouTubeを閉じる" },
  { icon: "🚪", text: "23:00にスマホをリビングに置く" },
  { icon: "🔒", text: "おやすみモードでYouTube・X・Amazon・メルカリを遮断" },
  { icon: "🍳", text: "食事は時短に徹する。凝らない。" }
];

var STORAGE_KEY = "sleep-coach-data";

function getToday() {
  var d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}

function getHour() { return new Date().getHours(); }

function getDayOfWeek(dateStr) {
  var days = ["日", "月", "火", "水", "木", "金", "土"];
  return days[new Date(dateStr).getDay()];
}

function hashDate(str) {
  var h = 5381;
  for (var i = 0; i < str.length; i++) {
    h = ((h * 33) ^ str.charCodeAt(i)) >>> 0;
  }
  return h;
}

function shuffleFacts(today) {
  var seed = hashDate(today);
  return FACTS.slice().sort(function(a, b) {
    var ha = hashDate(today + "-" + FACTS.indexOf(a)) % 9973;
    var hb = hashDate(today + "-" + FACTS.indexOf(b)) % 9973;
    return ha - hb;
  }).slice(0, 4);
}

function assign() {
  var result = {};
  for (var i = 0; i < arguments.length; i++) {
    var obj = arguments[i];
    if (obj) for (var k in obj) { if (obj.hasOwnProperty(k)) result[k] = obj[k]; }
  }
  return result;
}

function todayRecord(data) {
  return data.history[getToday()] || {};
}

var S = {
  container: {
    minHeight: "100vh", backgroundColor: "#0a0a0a", color: "#e5e5e5",
    fontFamily: '-apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif',
    padding: "20px 16px", display: "flex", flexDirection: "column", alignItems: "center"
  },
  loadingText: { marginTop: 100, fontSize: 16, color: "#666" },
  progressBar: { width: "100%", maxWidth: 400, height: 3, backgroundColor: "#222", borderRadius: 2, overflow: "hidden", marginBottom: 6 },
  progressFill: { height: "100%", backgroundColor: "#dc2626", transition: "width 0.3s ease" },
  progressLabel: { fontSize: 12, color: "#555", marginBottom: 20, fontVariantNumeric: "tabular-nums" },
  factCard: { width: "100%", maxWidth: 400, backgroundColor: "#111", border: "1px solid #1a1a1a", borderRadius: 12, padding: "28px 22px", marginBottom: 20 },
  categoryBadge: { fontSize: 12, color: "#dc2626", fontWeight: 600, letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 20 },
  metricBlock: { marginBottom: 22 },
  metricValue: { fontSize: 56, fontWeight: 800, color: "#dc2626", lineHeight: 1, fontVariantNumeric: "tabular-nums", letterSpacing: "-0.03em" },
  metricLabel: { fontSize: 13, color: "#777", marginTop: 6 },
  factTitle: { fontSize: 20, fontWeight: 700, color: "#f5f5f5", lineHeight: 1.4, margin: "0 0 14px 0" },
  factBody: { fontSize: 15, lineHeight: 1.7, color: "#b0b0b0", marginBottom: 16 },
  factSource: { fontSize: 11, color: "#555", fontStyle: "italic" },
  nextBtn: { width: "100%", maxWidth: 400, padding: "16px 24px", backgroundColor: "#dc2626", color: "#fff", border: "none", borderRadius: 10, fontSize: 16, fontWeight: 700, cursor: "pointer", letterSpacing: "0.02em" },
  rulesTitle: { fontSize: 22, fontWeight: 700, color: "#f5f5f5", margin: "10px 0 20px 0" },
  rulesList: { width: "100%", maxWidth: 400, marginBottom: 24 },
  ruleItem: { display: "flex", alignItems: "center", gap: 14, padding: "14px 18px", backgroundColor: "#111", border: "1px solid #1a1a1a", borderRadius: 10, marginBottom: 8 },
  ruleIcon: { fontSize: 22, flexShrink: 0 },
  ruleText: { fontSize: 15, color: "#d4d4d4", lineHeight: 1.5 },
  ackBtn: { width: "100%", maxWidth: 400, padding: "16px 24px", backgroundColor: "#222", color: "#999", border: "1px solid #333", borderRadius: 10, fontSize: 15, fontWeight: 600, cursor: "pointer", marginTop: 8 },
  commitBtn: { width: "100%", maxWidth: 400, padding: "18px 24px", backgroundColor: "#dc2626", color: "#fff", border: "none", borderRadius: 10, fontSize: 17, fontWeight: 800, cursor: "pointer", marginTop: 8, letterSpacing: "0.02em" },
  streakBanner: { fontSize: 16, fontWeight: 700, color: "#f59e0b", textAlign: "center", padding: "10px 0", marginBottom: 16 },
  weekGrid: { display: "flex", gap: 8, justifyContent: "center", marginBottom: 24, width: "100%", maxWidth: 400 },
  weekDay: { display: "flex", flexDirection: "column", alignItems: "center", gap: 6, flex: 1 },
  weekDayLabel: { fontSize: 11, color: "#555" },
  weekDot: { width: 36, height: 36, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, fontWeight: 700, color: "#fff" },
  morningCard: { maxWidth: 400, width: "100%", backgroundColor: "#111", border: "1px solid #1a1a1a", borderRadius: 12, padding: "32px 22px", textAlign: "center", marginTop: 40 },
  morningTitle: { fontSize: 20, fontWeight: 700, color: "#f5f5f5", margin: "0 0 12px 0" },
  morningBody: { fontSize: 15, color: "#999", marginBottom: 24 },
  morningButtons: { display: "flex", gap: 12 },
  successBtn: { flex: 1, padding: "14px 0", backgroundColor: "#14532d", color: "#22c55e", border: "1px solid #166534", borderRadius: 10, fontSize: 16, fontWeight: 700, cursor: "pointer" },
  failBtn: { flex: 1, padding: "14px 0", backgroundColor: "#450a0a", color: "#ef4444", border: "1px solid #7f1d1d", borderRadius: 10, fontSize: 16, fontWeight: 700, cursor: "pointer" },
  morningResult: { padding: "12px 0" },
  doneCard: { maxWidth: 400, width: "100%", textAlign: "center", marginTop: 40 },
  doneTitle: { fontSize: 22, fontWeight: 700, color: "#f5f5f5", margin: "0 0 10px 0" },
  doneBody: { fontSize: 15, color: "#777", marginBottom: 24 },
  countdown: { backgroundColor: "#111", border: "1px solid #1a1a1a", borderRadius: 12, padding: "20px", marginBottom: 20 },
  countdownLabel: { fontSize: 12, color: "#555", marginBottom: 6, letterSpacing: "0.1em", textTransform: "uppercase" },
  countdownValue: { fontSize: 32, fontWeight: 800, color: "#dc2626", fontVariantNumeric: "tabular-nums" },
  doneReminder: { fontSize: 14, color: "#888", lineHeight: 1.8, whiteSpace: "pre-line", backgroundColor: "#111", border: "1px solid #1a1a1a", borderRadius: 12, padding: "16px 20px", textAlign: "left" },
  resetBtn: { marginTop: 32, padding: "10px 20px", backgroundColor: "transparent", color: "#444", border: "1px solid #222", borderRadius: 8, fontSize: 12, cursor: "pointer" },
  actionCard: { maxWidth: 400, width: "100%", backgroundColor: "#111", border: "2px solid #dc2626", borderRadius: 16, padding: "36px 24px", textAlign: "center", marginTop: 30 },
  actionIcon: { fontSize: 56, marginBottom: 16 },
  actionTitle: { fontSize: 22, fontWeight: 800, color: "#f5f5f5", margin: "0 0 12px 0", lineHeight: 1.3 },
  actionBody: { fontSize: 15, color: "#999", lineHeight: 1.7, marginBottom: 24 },
  actionTime: { fontSize: 13, color: "#dc2626", fontWeight: 700, letterSpacing: "0.08em", marginBottom: 20 },
  actionConfirmBtn: { width: "100%", padding: "18px 24px", backgroundColor: "#dc2626", color: "#fff", border: "none", borderRadius: 12, fontSize: 17, fontWeight: 800, cursor: "pointer", letterSpacing: "0.02em" },
  actionDoneMsg: { fontSize: 18, fontWeight: 700, color: "#22c55e", padding: "16px 0" },
  actionChecklist: { textAlign: "left", marginBottom: 24, padding: "16px 20px", backgroundColor: "#0a0a0a", borderRadius: 10 },
  actionCheckItem: { display: "flex", alignItems: "center", gap: 10, padding: "8px 0", fontSize: 14, color: "#b0b0b0" },
  actionCheckDone: { color: "#22c55e", textDecoration: "line-through" },
  goodnightCard: { maxWidth: 400, width: "100%", textAlign: "center", marginTop: 60 },
  goodnightIcon: { fontSize: 64, marginBottom: 16 },
  goodnightTitle: { fontSize: 24, fontWeight: 800, color: "#f5f5f5", margin: "0 0 12px 0" },
  goodnightBody: { fontSize: 16, color: "#777", lineHeight: 1.6 }
};

function SleepCoach() {
  var phaseState = useState("loading");
  var phase = phaseState[0], setPhase = phaseState[1];

  var factIndexState = useState(0);
  var factIndex = factIndexState[0], setFactIndex = factIndexState[1];

  var rulesAckedState = useState(false);
  var rulesAcked = rulesAckedState[0], setRulesAcked = rulesAckedState[1];

  var dataState = useState({ streak: 0, history: {}, lastCheckIn: null });
  var data = dataState[0], setData = dataState[1];

  var morningResultState = useState(null);
  var morningResult = morningResultState[0], setMorningResult = morningResultState[1];

  var todayFactsState = useState([]);
  var todayFacts = todayFactsState[0], setTodayFacts = todayFactsState[1];

  useEffect(function() {
    var loadedData;
    try {
      var value = localStorage.getItem(STORAGE_KEY);
      if (value) { loadedData = JSON.parse(value); }
    } catch (err) {}
    if (!loadedData) { loadedData = { streak: 0, history: {}, lastCheckIn: null }; }

    setData(loadedData);

    var today = getToday();
    setTodayFacts(shuffleFacts(today));

    var rec = loadedData.history[today] || {};
    var hour = getHour();

    if (loadedData.lastCheckIn && loadedData.lastCheckIn !== today && loadedData.history[loadedData.lastCheckIn] && !loadedData.history[loadedData.lastCheckIn].result) {
      setPhase("morning");
    } else if (!rec.committed) {
      setPhase("facts");
    } else if (hour >= 23 && !rec.phoneOut) {
      setPhase("phone");
    } else if (hour >= 20 && !rec.youtubeOff) {
      setPhase("youtube");
    } else if (hour >= 23 && rec.phoneOut) {
      setPhase("goodnight");
    } else {
      setPhase("done");
    }
  }, []);

  function saveData(newData) {
    setData(newData);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(newData)); } catch (err) {}
  }

  function updateTodayRecord(fields) {
    var today = getToday();
    var newHistory = assign({}, data.history);
    newHistory[today] = assign({}, newHistory[today], fields);
    saveData(assign({}, data, { history: newHistory }));
  }

  function handleNextFact() {
    if (factIndex < todayFacts.length - 1) { setFactIndex(factIndex + 1); }
    else { setPhase("rules"); }
  }

  function handleCommit() {
    var today = getToday();
    var newHistory = assign({}, data.history);
    newHistory[today] = assign({}, newHistory[today], { committed: true, time: new Date().toISOString() });
    saveData(assign({}, data, { history: newHistory, lastCheckIn: today }));
    var hour = getHour();
    if (hour >= 23) { setPhase("phone"); }
    else if (hour >= 20) { setPhase("youtube"); }
    else { setPhase("done"); }
  }

  function handleYoutubeOff() {
    updateTodayRecord({ youtubeOff: true, youtubeOffTime: new Date().toISOString() });
    setPhase("done");
  }

  function handlePhoneOut() {
    updateTodayRecord({ phoneOut: true, phoneOutTime: new Date().toISOString() });
    setPhase("goodnight");
  }

  function handleMorningReport(success) {
    setMorningResult(success);
    var yesterday = data.lastCheckIn;
    if (!yesterday) return;
    var newHistory = assign({}, data.history);
    newHistory[yesterday] = assign({}, newHistory[yesterday], { result: success });
    var newStreak = success ? data.streak + 1 : 0;
    saveData(assign({}, data, { history: newHistory, streak: newStreak }));
    setTimeout(function() { setPhase("facts"); setMorningResult(null); }, 2000);
  }

  function handleReset() {
    saveData({ streak: 0, history: {}, lastCheckIn: null });
    setFactIndex(0);
    setRulesAcked(false);
    setPhase("facts");
  }

  var recentDays = [];
  for (var i = 6; i >= 0; i--) {
    var d = new Date();
    d.setDate(d.getDate() - i);
    var key = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
    recentDays.push(assign({ date: key, day: getDayOfWeek(key) }, data.history[key]));
  }

  var rec = todayRecord(data);

  // --- LOADING ---
  if (phase === "loading") {
    return e("div", { style: S.container },
      e("div", { style: S.loadingText }, "読み込み中...")
    );
  }

  // --- MORNING REPORT ---
  if (phase === "morning") {
    var morningContent;
    if (morningResult === null) {
      morningContent = e("div", { style: S.morningButtons },
        e("button", { style: S.successBtn, onClick: function() { handleMorningReport(true); } }, "✓ できた"),
        e("button", { style: S.failBtn, onClick: function() { handleMorningReport(false); } }, "✗ できなかった")
      );
    } else {
      morningContent = e("div", { style: S.morningResult },
        morningResult
          ? e("p", { style: { color: "#22c55e", fontSize: 18, fontWeight: 700 } }, "記録しました。継続していきましょう。")
          : e("p", { style: { color: "#f59e0b", fontSize: 18, fontWeight: 700 } }, "正直に報告できたことが大事です。今夜こそ。")
      );
    }
    return e("div", { style: S.container },
      e("div", { style: S.morningCard },
        e("div", { style: { fontSize: 40, marginBottom: 12 } }, "🌅"),
        e("h2", { style: S.morningTitle }, "昨夜の結果報告"),
        e("p", { style: S.morningBody }, "23:00までにスマホを手放して消灯できましたか？"),
        morningContent
      )
    );
  }

  // --- FACTS ---
  if (phase === "facts") {
    var fact = todayFacts[factIndex];
    if (!fact) return null;
    var progress = factIndex + 1;
    var total = todayFacts.length;

    return e("div", { style: S.container },
      e("div", { style: S.progressBar },
        e("div", { style: assign({}, S.progressFill, { width: (progress / total * 100) + "%" }) })
      ),
      e("div", { style: S.progressLabel }, progress + " / " + total),
      e("div", { style: S.factCard },
        e("div", { style: S.categoryBadge }, fact.icon + " " + fact.category),
        e("div", { style: S.metricBlock },
          e("div", { style: S.metricValue }, fact.metric),
          e("div", { style: S.metricLabel }, fact.metricLabel)
        ),
        e("h2", { style: S.factTitle }, fact.title),
        e("p", { style: S.factBody }, fact.body),
        e("p", { style: S.factSource }, fact.source)
      ),
      e("button", { style: S.nextBtn, onClick: handleNextFact },
        factIndex < todayFacts.length - 1 ? "次の事実を見る →" : "ルール確認へ →"
      )
    );
  }

  // --- RULES ---
  if (phase === "rules") {
    var ruleItems = RULES.map(function(r, i) {
      return e("div", { key: i, style: S.ruleItem },
        e("span", { style: S.ruleIcon }, r.icon),
        e("span", { style: S.ruleText }, r.text)
      );
    });

    var weekDots = recentDays.map(function(d, i) {
      var bg = d.result === true ? "#22c55e" : d.result === false ? "#ef4444" : d.committed ? "#f59e0b" : "#333";
      var label = d.result === true ? "✓" : d.result === false ? "✗" : d.committed ? "−" : "";
      return e("div", { key: i, style: S.weekDay },
        e("div", { style: S.weekDayLabel }, d.day),
        e("div", { style: assign({}, S.weekDot, { backgroundColor: bg }) }, label)
      );
    });

    var bottomBtn = !rulesAcked
      ? e("button", { style: S.ackBtn, onClick: function() { setRulesAcked(true); } }, "理解した。すべて読んだ。")
      : e("button", { style: S.commitBtn, onClick: handleCommit }, "今夜、23:00に消灯することを誓う");

    return e("div", { style: S.container },
      e("h2", { style: S.rulesTitle }, "今夜守る4つのルール"),
      e("div", { style: S.rulesList }, ruleItems),
      data.streak > 0 ? e("div", { style: S.streakBanner }, "🔥 現在の連続達成: " + data.streak + "日") : null,
      e("div", { style: S.weekGrid }, weekDots),
      bottomBtn
    );
  }

  // --- YOUTUBE OFF (20:00~) ---
  if (phase === "youtube") {
    return e("div", { style: S.container },
      e("div", { style: S.actionCard },
        e("div", { style: S.actionIcon }, "📵"),
        e("div", { style: S.actionTime }, "20:00 — アクション必須"),
        e("h2", { style: S.actionTitle }, "YouTubeを今すぐ閉じろ"),
        e("p", { style: S.actionBody },
          "食後のダラダラ視聴が睡眠時間を奪う最大の原因。\n「あと1本」はない。今閉じなければ23:00消灯は不可能。"),
        e("div", { style: S.actionChecklist },
          e("div", { style: S.actionCheckItem }, "1. YouTubeアプリを閉じる"),
          e("div", { style: S.actionCheckItem }, "2. X（Twitter）も閉じる"),
          e("div", { style: S.actionCheckItem }, "3. Amazon・メルカリも閲覧しない")
        ),
        e("button", { style: S.actionConfirmBtn, onClick: handleYoutubeOff },
          "すべて閉じた。確認する。")
      )
    );
  }

  // --- PHONE OUT (23:00~) ---
  if (phase === "phone") {
    return e("div", { style: S.container },
      e("div", { style: assign({}, S.actionCard, { borderColor: "#f59e0b" }) },
        e("div", { style: S.actionIcon }, "🚪"),
        e("div", { style: assign({}, S.actionTime, { color: "#f59e0b" }) }, "23:00 — 最終アクション"),
        e("h2", { style: S.actionTitle }, "スマホをリビングに置け"),
        e("p", { style: S.actionBody },
          "寝室にスマホを持ち込んだ時点で負け。\n目覚ましはスマートウォッチで十分。今すぐ手放せ。"),
        e("div", { style: S.actionChecklist },
          e("div", { style: S.actionCheckItem }, "1. おやすみモードをONにする"),
          e("div", { style: S.actionCheckItem }, "2. スマホをリビングの充電器に置く"),
          e("div", { style: S.actionCheckItem }, "3. 寝室に入る → 消灯")
        ),
        e("button", { style: assign({}, S.actionConfirmBtn, { backgroundColor: "#f59e0b", color: "#000" }), onClick: handlePhoneOut },
          "スマホを置いた。おやすみ。")
      )
    );
  }

  // --- GOODNIGHT ---
  if (phase === "goodnight") {
    return e("div", { style: S.container },
      e("div", { style: S.goodnightCard },
        e("div", { style: S.goodnightIcon }, "🌙"),
        e("h2", { style: S.goodnightTitle }, "おやすみなさい"),
        e("p", { style: S.goodnightBody }, "今日のすべてのタスク完了。\nあとは目を閉じるだけ。"),
        e("div", { style: assign({}, S.actionChecklist, { marginTop: 24 }) },
          e("div", { style: assign({}, S.actionCheckItem, S.actionCheckDone) }, "✓ チェックイン完了"),
          e("div", { style: assign({}, S.actionCheckItem, S.actionCheckDone) }, "✓ YouTube・SNS終了"),
          e("div", { style: assign({}, S.actionCheckItem, S.actionCheckDone) }, "✓ スマホをリビングに配置")
        ),
        data.streak > 0 ? e("div", { style: assign({}, S.streakBanner, { marginTop: 20 }) }, "🔥 連続達成: " + data.streak + "日") : null,
        e("button", { style: S.resetBtn, onClick: handleReset }, "リセット（テスト用）")
      )
    );
  }

  // --- DONE (checkin complete, waiting for next action) ---
  if (phase === "done") {
    var now = new Date();
    var hour = now.getHours();

    var nextAction = null;
    var nextTime = null;
    if (!rec.youtubeOff && hour < 20) {
      nextAction = "📵 YouTubeを閉じる";
      nextTime = new Date(); nextTime.setHours(20, 0, 0, 0);
    } else if (!rec.phoneOut) {
      nextAction = "🚪 スマホをリビングに置く";
      nextTime = new Date(); nextTime.setHours(23, 0, 0, 0);
    }

    var target23 = new Date(); target23.setHours(23, 0, 0, 0);
    var diffLights = target23 - now;
    var hoursLeft = diffLights > 0 ? Math.floor(diffLights / 3600000) : 0;
    var minsLeft = diffLights > 0 ? Math.floor((diffLights % 3600000) / 60000) : 0;

    var diffNext = nextTime ? nextTime - now : 0;
    var nextH = diffNext > 0 ? Math.floor(diffNext / 3600000) : 0;
    var nextM = diffNext > 0 ? Math.floor((diffNext % 3600000) / 60000) : 0;

    return e("div", { style: S.container },
      e("div", { style: S.doneCard },
        e("div", { style: { fontSize: 48, marginBottom: 8 } }, "✅"),
        e("h2", { style: S.doneTitle }, "今日のチェックイン完了"),
        e("p", { style: S.doneBody }, "今夜の誓いは記録されました。"),
        diffLights > 0 ? e("div", { style: S.countdown },
          e("div", { style: S.countdownLabel }, "消灯まで"),
          e("div", { style: S.countdownValue }, hoursLeft + "時間 " + minsLeft + "分")
        ) : null,
        nextAction && diffNext > 0 ? e("div", { style: assign({}, S.countdown, { borderColor: "#f59e0b" }) },
          e("div", { style: S.countdownLabel }, "次のアクション"),
          e("div", { style: { fontSize: 16, fontWeight: 700, color: "#f5f5f5", marginBottom: 4 } }, nextAction),
          e("div", { style: { fontSize: 14, color: "#f59e0b" } }, nextH + "時間 " + nextM + "分後")
        ) : null,
        e("div", { style: S.actionChecklist },
          e("div", { style: assign({}, S.actionCheckItem, rec.committed ? S.actionCheckDone : {}) },
            (rec.committed ? "✓ " : "○ ") + "チェックイン"),
          e("div", { style: assign({}, S.actionCheckItem, rec.youtubeOff ? S.actionCheckDone : {}) },
            (rec.youtubeOff ? "✓ " : "○ ") + "YouTube・SNS終了（20:00）"),
          e("div", { style: assign({}, S.actionCheckItem, rec.phoneOut ? S.actionCheckDone : {}) },
            (rec.phoneOut ? "✓ " : "○ ") + "スマホ追放（23:00）")
        ),
        data.streak > 0 ? e("div", { style: assign({}, S.streakBanner, { marginTop: 20 }) }, "🔥 連続達成: " + data.streak + "日") : null,
        e("button", { style: S.resetBtn, onClick: handleReset }, "リセット（テスト用）")
      )
    );
  }

  return null;
}

var root = ReactDOM.createRoot(document.getElementById("root"));
root.render(e(SleepCoach));
  </script>
</body>
</html>
